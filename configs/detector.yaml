# Baseline Detector Configuration
# Research-tuned thresholds: lower values catch subtler attacks and produce
# more detections per PCAP, enabling meaningful compression ratios and
# cross-case correlation analysis.

detectors:
  recon_scanning:
    enabled: true
    time_window_seconds: 120  # 2 minutes (finer temporal granularity)
    fan_out_threshold: 15     # unique destination IPs (catches smaller scans)
    burst_threshold: 20       # connections in window (catches slower bursts)
    failed_connection_ratio: 0.4  # 40% failed connections

  dns_beaconing:
    enabled: true
    time_window_seconds: 300  # 5 minutes (finer windows, more detections)
    repeated_query_threshold: 5   # same domain queried 5+ times
    periodicity_window_seconds: 1800  # 30 minutes
    nxdomain_ratio_threshold: 0.15   # 15% NXDOMAIN responses
    min_unique_domains: 3  # minimum domains to consider beaconing

case_assembly:
  time_window_seconds: 1800  # 30 minutes
  min_evidence_rows: 5
  confidence_threshold: 0.6

reporting:
  max_evidence_rows_per_case: 50
  include_timeline: true
  include_metadata: true
