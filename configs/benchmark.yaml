# Benchmark PCAP Suite Configuration
# Defines PCAPs used for evaluation, ablation, and cross-run comparison.

benchmark:
  pcaps:
    # --- Synthetic PCAPs (generated locally, deterministic) ---
    - name: "synthetic-scan"
      path: "data/raw/synthetic/synthetic_scan.pcap"
      label: "malicious"
      expected_detections: ["recon_scanning"]
      expected_sources:
        - src_ip: "10.200.1.50"
          detection_type: "recon_scanning"
      description: "Synthetic port scanning - one source scanning 120+ destinations"

    - name: "synthetic-beacon"
      path: "data/raw/synthetic/synthetic_beacon.pcap"
      label: "malicious"
      expected_detections: ["dns_beaconing"]
      expected_sources:
        - src_ip: "10.100.5.20"
          detection_type: "dns_beaconing"
      description: "Synthetic DNS beaconing - repeated queries to C2 domain every 30s"

    - name: "synthetic-benign"
      path: "data/raw/synthetic/synthetic_benign.pcap"
      label: "benign"
      expected_detections: []
      description: "Synthetic normal web browsing and DNS traffic"

    - name: "synthetic-mixed"
      path: "data/raw/synthetic/synthetic_mixed.pcap"
      label: "malicious"
      expected_detections: ["recon_scanning"]
      expected_sources:
        - src_ip: "10.200.1.50"
          detection_type: "recon_scanning"
      description: "Normal traffic mixed with embedded port scan from one IP"

    - name: "synthetic-dns-exfil"
      path: "data/raw/synthetic/synthetic_dns_exfil.pcap"
      label: "malicious"
      expected_detections: ["dns_beaconing"]
      expected_sources:
        - src_ip: "10.100.5.20"
          detection_type: "dns_beaconing"
      description: "DNS exfiltration via high-entropy subdomain queries"

    - name: "synthetic-multi-attacker"
      path: "data/raw/synthetic/synthetic_multi_attacker.pcap"
      label: "malicious"
      expected_detections: ["recon_scanning", "dns_beaconing"]
      expected_sources:
        - src_ip: "10.200.1.50"
          detection_type: "recon_scanning"
        - src_ip: "10.200.2.75"
          detection_type: "recon_scanning"
        - src_ip: "10.100.3.30"
          detection_type: "dns_beaconing"
      description: "3 simultaneous attackers: 2 scanners + 1 DNS beaconer"

    - name: "synthetic-killchain"
      path: "data/raw/synthetic/synthetic_killchain.pcap"
      label: "malicious"
      expected_detections: ["recon_scanning", "dns_beaconing"]
      expected_sources:
        - src_ip: "10.200.5.100"
          detection_type: "recon_scanning"
        - src_ip: "10.200.5.100"
          detection_type: "dns_beaconing"
      description: "Single attacker kill chain: recon -> C2 beaconing -> lateral movement"

    - name: "synthetic-slow-scan"
      path: "data/raw/synthetic/synthetic_slow_scan.pcap"
      label: "malicious"
      expected_detections: ["recon_scanning"]
      expected_sources:
        - src_ip: "10.200.9.5"
          detection_type: "recon_scanning"
      description: "Low-and-slow scanner (1 conn/30-60s) with heavy background noise"

    - name: "synthetic-noisy-benign"
      path: "data/raw/synthetic/synthetic_noisy_benign.pcap"
      label: "benign"
      expected_detections: []
      description: "Heavy benign traffic that resembles malicious patterns (FP test)"

    # --- Adversarial Evasion PCAPs (designed to challenge detectors) ---
    - name: "synthetic-evasion-ip-rotation"
      path: "data/raw/synthetic/synthetic_evasion_ip_rotation.pcap"
      label: "malicious"
      expected_detections: ["recon_scanning"]
      expected_sources:
        - src_ip: "10.200.3.1"
          detection_type: "recon_scanning"
        - src_ip: "10.200.3.2"
          detection_type: "recon_scanning"
        - src_ip: "10.200.3.3"
          detection_type: "recon_scanning"
        - src_ip: "10.200.3.4"
          detection_type: "recon_scanning"
        - src_ip: "10.200.3.5"
          detection_type: "recon_scanning"
      description: "Evasion: 5 rotating IPs each below fan-out threshold (12 targets each, 60 total)"

    - name: "synthetic-evasion-jittery-beacon"
      path: "data/raw/synthetic/synthetic_evasion_jittery_beacon.pcap"
      label: "malicious"
      expected_detections: ["dns_beaconing"]
      expected_sources:
        - src_ip: "10.100.7.10"
          detection_type: "dns_beaconing"
      description: "Evasion: DNS beaconing with high jitter (CV>1.0) to evade periodicity detection"

    - name: "synthetic-evasion-slow-drip"
      path: "data/raw/synthetic/synthetic_evasion_slow_drip.pcap"
      label: "malicious"
      expected_detections: ["dns_beaconing"]
      expected_sources:
        - src_ip: "10.100.7.20"
          detection_type: "dns_beaconing"
      description: "Evasion: 1 DNS query per 5min over 1hr — tests minimum detection sensitivity"

    # --- Public Dataset PCAPs (downloaded) ---
    - name: "ctu13-neris"
      path: "data/raw/benchmark/ctu13-neris.pcap"
      url: "https://mcfp.felk.cvut.cz/publicDatasets/CTU-Malware-Capture-Botnet-42/botnet-capture-20110810-neris.pcap"
      label: "malicious"
      expected_detections: ["recon_scanning", "dns_beaconing"]
      expected_sources:
        - src_ip: "147.32.84.165"
          detection_type: "recon_scanning"
        - src_ip: "147.32.84.165"
          detection_type: "dns_beaconing"
      description: "CTU-13 Botnet-42: Neris botnet with IRC C2 and scanning"
      max_size_mb: 700

    - name: "wireshark-http"
      path: "data/raw/benchmark/wireshark-http.pcap"
      url: "https://github.com/wireshark/wireshark/raw/master/test/captures/http.pcap"
      label: "benign"
      expected_detections: []
      description: "Wireshark sample HTTP traffic (benign baseline)"

  # More permissive thresholds for benchmark to capture activity in smaller PCAPs
  detector_overrides:
    recon_scanning:
      fan_out_threshold: 15
      burst_threshold: 30
      time_window_seconds: 300
    dns_beaconing:
      repeated_query_threshold: 5
      nxdomain_ratio_threshold: 0.15
      time_window_seconds: 600
