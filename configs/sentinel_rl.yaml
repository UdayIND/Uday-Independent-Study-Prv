# =============================================================================
# SENTINEL-RL Master Configuration
# Hyperparameters and system settings aligned with the paper.
# =============================================================================

# --- Section IV-A: Data Plane ---
data_plane:
  dataset: "lanl"
  lanl:
    auth_file: "data/lanl/auth.txt"
    # Subset size for development; set to null for full dataset
    max_edges: null
  neo4j:
    uri: "${NEO4J_URI:-neo4j://localhost:7687}"
    user: "${NEO4J_USER:-neo4j}"
    password: "${NEO4J_PASSWORD:-password}"
  ingestion:
    # Two-phase CREATE pattern (Section V-A)
    batch_size: 5000
    num_workers: 8  # Ray Data parallel workers

# --- Section IV-B: Strategic Plane ---
strategic_plane:
  encoder:
    type: "HetGAT"
    in_channels: 16
    hidden_channels: 64
    out_channels: 64     # s_t ∈ R^64
    heads_layer_1: 4
    heads_layer_2: 1
  ppo:
    # Table I: Hyperparameter mapping (RLModule/Learner API)
    train_batch_size_per_learner: 4000
    minibatch_size: 128
    num_epochs: 10       # num_sgd_iter → num_epochs
    lr: 5.0e-5
    clip_param: 0.2
    entropy_coeff: 0.01
    gamma: 0.99
    lambda_: 0.95
    # Training
    num_iterations: 200
    num_seeds: 5
    # Environment
    max_investigation_steps: 10
    step_penalty: -0.01
  actions:
    - "QueryEDR"
    - "QueryAD"
    - "CheckThreatIntel"
    - "ExamineFirewall"
    - "TerminateAndOutputVerdict"

# --- Section IV-C: Telemetry Plane ---
telemetry_plane:
  alert_engine:
    window_seconds: 10      # W = 10s
    threshold: 25            # N = 25 events
    webhook_url: "http://localhost:8000/trigger_investigation"

# --- Section IV-D: Orchestration Plane ---
orchestration_plane:
  llm:
    model: "gpt-4o-mini"
    temperature_triage: 0.1
    temperature_critic: 0.0
  tiered_autonomy:
    tier_1:  # Read-only enrichment — auto
      actions: ["QueryEDR", "QueryAD", "CheckThreatIntel", "ExamineFirewall"]
      approval: "none"
    tier_2:  # Reversible containment — critic-gated
      actions: ["DropSession", "QuarantineEmail"]
      approval: "critic"
    tier_3:  # Irreversible — human-gated
      actions: ["TerminateAndOutputVerdict", "DisableAccount", "IsolateHost"]
      approval: "human"

# --- Section V-B: HPC Deployment ---
hpc:
  anchor_node:
    cpus: 32
    memory_gb: 128
    partition: "general"
    time_limit: "24:00:00"

# --- Section VII: Enterprise Readiness ---
enterprise:
  false_positive:
    terminate_probability_threshold: 0.5
  entropy_escalation_threshold: 1.5
  recall_floor: 0.85
  kill_switch_revert_seconds: 60
