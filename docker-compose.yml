services:
  zeek:
    image: blacktop/zeek:latest
    container_name: soc-zeek
    user: root
    volumes:
      - ./data/raw:/pcap:ro
      - ./data/derived/zeek:/logs:rw
    environment:
      - PCAP_FILE=${PCAP_FILE:-}
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -z "$PCAP_FILE" ]; then
          echo 'Error: PCAP_FILE environment variable not set';
          exit 1;
        fi
        if [ ! -f "/pcap/$PCAP_FILE" ]; then
          echo "Error: PCAP file /pcap/$PCAP_FILE not found";
          exit 1;
        fi
        echo "Processing PCAP: /pcap/$PCAP_FILE"
        cd /logs
        zeek -r "/pcap/$PCAP_FILE" -C LogAscii::use_json=T 2>&1 || true
        if [ -f /logs/conn.log ]; then
          echo "Generated conn.log"
        else
          echo "conn.log not generated"
        fi
        if [ -f /logs/dns.log ]; then
          echo "Generated dns.log"
        fi
        echo "Zeek processing completed"
    networks:
      - soc-network
    restart: "no"

  suricata:
    image: jasonish/suricata:latest
    container_name: soc-suricata
    user: root
    volumes:
      - ./data/raw:/pcap:ro
      - ./data/derived/suricata:/var/log/suricata:rw
    environment:
      - PCAP_FILE=${PCAP_FILE:-}
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -z "$PCAP_FILE" ]; then
          echo 'Error: PCAP_FILE environment variable not set';
          exit 1;
        fi
        if [ ! -f "/pcap/$PCAP_FILE" ]; then
          echo "Error: PCAP file /pcap/$PCAP_FILE not found";
          exit 1;
        fi
        echo "Processing PCAP: /pcap/$PCAP_FILE"
        suricata -r "/pcap/$PCAP_FILE" -l /var/log/suricata 2>&1 || true
        if [ -f /var/log/suricata/eve.json ]; then
          echo "Generated eve.json"
        else
          echo "eve.json not generated"
        fi
        echo "Suricata processing completed"
    networks:
      - soc-network
    restart: "no"

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-pipeline
    user: root
    volumes:
      - ./data:/app/data:rw
      - ./reports:/app/reports:rw
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
    environment:
      - PCAP_FILE=${PCAP_FILE:-}
      - RUN_TIMESTAMP=${RUN_TIMESTAMP:-}
    command: python -m src.main --pcap /app/data/raw/$${PCAP_FILE}
    networks:
      - soc-network
    depends_on:
      - zeek
      - suricata
    restart: "no"

networks:
  soc-network:
    driver: bridge
