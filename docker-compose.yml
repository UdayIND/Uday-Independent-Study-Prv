# =============================================================================
# SENTINEL-RL Docker Compose
# Services: Neo4j (required), FastAPI, Streamlit (optional)
# =============================================================================

services:
  # --- Neo4j Graph Database (Section IV-A) ---
  neo4j:
    image: neo4j:5-community
    container_name: sentinel-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_server_memory_heap_initial__size=2g
      - NEO4J_server_memory_heap_max__size=4g
      - NEO4J_server_memory_pagecache_size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - sentinel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FastAPI Policy Endpoint ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./data:/app/data:rw
      - ./configs:/app/configs:ro
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    networks:
      - sentinel-network
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # --- Streamlit Analyst Workbench (Section IV-D) ---
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-ui
    ports:
      - "8501:8501"
    environment:
      - API_HOST=api
      - API_PORT=8000
    volumes:
      - ./src:/app/src:ro
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0
    networks:
      - sentinel-network
    depends_on:
      - api
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  sentinel-network:
    driver: bridge
